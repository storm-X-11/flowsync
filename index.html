<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FlowSync</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="FlowSync" />
    <meta name="description" content="FlowSync — Workflow Management Platform" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        min-height: 100%;
        min-height: 100dvh;
        background: #0A1628;
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
        -webkit-overflow-scrolling: touch;
      }
      /* Prevent white flash on load */
      body { background-color: #0A1628; }
      /* Remove default input/button styles */
      input, button, textarea, select {
        font-family: inherit;
      }
      /* Smooth scrolling */
      * { scroll-behavior: smooth; }
      /* Hide scrollbars but keep functionality */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: rgba(13,191,191,0.3); border-radius: 4px; }
      ::-webkit-scrollbar-thumb:hover { background: rgba(13,191,191,0.6); }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
