<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>FlowSync</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo-192.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0A1628" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="FlowSync" />
    <meta name="description" content="FlowSync — Workflow Management Platform" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root {
        min-height: 100%;
        min-height: 100dvh;
        background: #0A1628;
        color: #fff;
        font-family: 'DM Sans', sans-serif;
        overscroll-behavior: none;
        -webkit-tap-highlight-color: transparent;
      }
      body { background-color: #0A1628; }
      input, button, textarea, select { font-family: inherit; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-thumb { background: rgba(13,191,191,0.3); border-radius: 4px; }
      #splash {
        position: fixed;
        inset: 0;
        background: #0A1628;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash img {
        width: 120px;
        height: 120px;
        border-radius: 28px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      #splash p {
        color: #0DBFBF;
        font-size: 22px;
        font-weight: 800;
        margin-top: 20px;
        letter-spacing: -0.3px;
      }
      #splash small {
        color: #4A5568;
        font-size: 13px;
        margin-top: 6px;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.85; }
      }
    </style>
  </head>
  <body>
    <div id="splash">
      <img src="/logo.png" alt="FlowSync" />
      <p>FlowSync</p>
      <small>Workflow Management Platform</small>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash');
          if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); }
        }, 800);
      });
    </script>
  </body>
</html>
